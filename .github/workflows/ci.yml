name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: Build webhook binary
        run: go build -v .

      - name: Unit tests (begetapi only)
        # example/ это integration-test cert-manager webhook conformance suite,
        # требует локального UDP DNS server — на GitHub runner fails. Запускается
        # локально через `make test` с kubebuilder/etcd/kube-apiserver tools.
        run: go test -v ./begetapi/...

      - name: Vet (без example/)
        # example/example_test.go использует unkeyed dns.Question literals из
        # cert-manager test-suite — vet ругается, но это код conformance-сьюита,
        # не наш. Vet'им только релевантные пакеты.
        run: go vet . ./begetapi/...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - run: helm lint deploy/beget
