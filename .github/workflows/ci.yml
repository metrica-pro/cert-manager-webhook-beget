name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: Build
        run: go build -v ./...

      - name: Unit tests (begetapi + example)
        run: go test -v ./begetapi/... ./example/...

      - name: Vet
        run: go vet ./...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - run: helm lint deploy/beget
